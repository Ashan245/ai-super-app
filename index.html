<!DOCTYPE html>
<html>
<head>
    <title>මගේ AI ඇප් එක</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h2>AI Smart Notes</h2>
    <input type="text" id="userInput" placeholder="යමක් ලියන්න...">
    <button onclick="askAI()">AI ගෙන් අහන්න</button>
    <p id="response"></p>

    <script>
        async function askAI() {
            const apiKey = "AIzaSyAS_OC5iZUQCcSyCZvElCW0ejLpTtvXF2g"; 
            const text = document.getElementById("userInput").value;
            
            // මෙතැනදී Google AI Studio API එකට දත්ත යවයි
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: text}]}]})
            });
            
            const data = await response.json();
            document.getElementById("response").innerText = data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
