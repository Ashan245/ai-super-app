<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashan AI Chat v2</title>
    <style>
        /* CSS පෙනුම */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0b141a;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: white;
        }

        .header {
            background-color: #202c33;
            padding: 15px;
            text-align: center;
            color: #00a884;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #313d45;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #0b141a;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background-color: #005c4b;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: #202c33;
            color: #e9edef;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            background-color: #202c33;
            padding: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            padding: 12px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        button {
            background-color: #00a884;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        /* Loading Animation */
        .typing {
            font-style: italic;
            font-size: 13px;
            color: #8696a0;
        }
    </style>
</head>
<body>

    <div class="header">Ashan AI Assistant</div>

    <div id="chat-container">
        <div class="message ai-msg">ආයුබෝවන්! මම සූදානම්. ඔබට අවශ්‍ය ඕනෑම දෙයක් අසන්න.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="පණිවිඩය ලියන්න..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>

    <script>
        // ඔබ ලබාදුන් අලුත් API Key එක
        const API_KEY = "AIzaSyDvt4svxIiDiSnwOyGjpnHCzRJ0HopAMEk";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. User Message එක පෙන්වීම
            addMessage(text, "user-msg");
            userInput.value = "";

            // 2. "හිතමින් පවතී" පණිවිඩය
            const loadingMsg = addMessage("හිතමින් පවතී... 🤖", "ai-msg");
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // 3. AI එකට Request එක යැවීම
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    loadingMsg.innerText = "දෝෂයක්: " + data.error.message;
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    loadingMsg.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    loadingMsg.innerText = "කණගාටුයි, පිළිතුරක් ලැබුණේ නැහැ.";
                }
            } catch (error) {
                loadingMsg.innerText = "සම්බන්ධතාවය බිඳ වැටුණා. නැවත උත්සාහ කරන්න.";
            }

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            return div;
        }

        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
