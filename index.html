<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashan AI Chat Assistant</title>
    <style>
        /* CSS පෙනුම හැඩගැන්වීම */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b141a; /* WhatsApp වැනි තද වර්ණය */
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: white;
        }

        /* ඉහළ තීරුව (Header) */
        .header {
            background-color: #202c33;
            padding: 15px;
            text-align: center;
            color: #00a884;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* මැසේජ් පෙන්වන ප්‍රදේශය */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Chat Wallpaper */
            background-blend-mode: overlay;
        }

        /* මැසේජ් බුබුළු (Bubbles) */
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }

        .user-msg {
            align-self: flex-end;
            background-color: #005c4b;
            color: #e9edef;
            border-top-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: #202c33;
            color: #e9edef;
            border-top-left-radius: 2px;
            border: 1px solid #313d45;
        }

        /* පහළ Input තීරුව */
        .input-area {
            background-color: #202c33;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        button {
            background-color: #00a884;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.9);
            background-color: #008f6f;
        }

        /* scrollbar සැඟවීම */
        #chat-container::-webkit-scrollbar {
            width: 5px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: #374045;
        }
    </style>
</head>
<body>

    <div class="header">Ashan AI Assistant</div>

    <div id="chat-container">
        <div class="message ai-msg">ආයුබෝවන්! මම අෂාන් AI. ඔබට අද මගෙන් ලැබිය යුතු උදව්ව කුමක්ද?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="පණිවිඩය ලියන්න..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>

    <script>
        // JavaScript ක්‍රියාකාරීත්වය
        const GEMINI_API_KEY = "AIzaSyAS_OC5iZUQCcSyCZvElCW0ejLpTtvXF2g"; 

        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        async function askAI() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. User මැසේජ් එක Chat එකට එකතු කිරීම
            addMessage(text, "user-msg");
            userInput.value = ""; // Input එක හිස් කිරීම

            // 2. Loading පණිවිඩයක් පෙන්වීම
            const loadingDiv = addMessage("හිතමින් පවතී... 🤖", "ai-msg");
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // 3. Google Gemini API එකට දත්ත යැවීම
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                // 4. පිළිතුර පරීක්ෂා කර පෙන්වීම
                if (data.error) {
                    loadingDiv.innerText = "Error: " + data.error.message;
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    loadingDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    loadingDiv.innerText = "කණගාටුයි, මට පිළිතුරක් සොයාගත නොහැකි වුණා.";
                }

            } catch (error) {
                loadingDiv.innerText = "දෝෂයක් සිදු විය: " + error.message;
            }

            // Chat එක පහළටම scroll කිරීම
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // මැසේජ් එකක් Screen එකට එකතු කරන Function එක
        function addMessage(text, className) {
            const div = document.createElement("div");
            div.className = "message " + className;
            div.innerText = text;
            chatContainer.appendChild(div);
            return div;
        }

        // Enter key එක එබූ විට මැසේජ් එක යැවීම
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") askAI();
        });

        sendBtn.onclick = askAI;
    </script>

</body>
</html>
